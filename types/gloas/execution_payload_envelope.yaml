Gloas:
  ExecutionPayloadEnvelope:
    type: object
    description: "The [`ExecutionPayloadEnvelope`](https://github.com/ethereum/consensus-specs/blob/v1.7.0-alpha.8/specs/gloas/beacon-chain.md#executionpayloadenvelope) object from the CL Gloas spec."
    required: [payload, execution_requests, builder_index, beacon_block_root, parent_beacon_block_root]
    properties:
      payload:
        $ref: "./execution_payload.yaml#/Gloas/ExecutionPayload"
      execution_requests:
        $ref: "../electra/execution_requests.yaml#/Electra/ExecutionRequests"
      builder_index:
        $ref: "../primitive.yaml#/Uint64"
        description: "Index of the builder that created this execution payload"
      beacon_block_root:
        $ref: "../primitive.yaml#/Root"
        description: "Root of the beacon block for this payload"
      parent_beacon_block_root:
        $ref: "../primitive.yaml#/Root"
        description: "Root of the parent beacon block"

  SignedExecutionPayloadEnvelope:
    type: object
    description: "The [`SignedExecutionPayloadEnvelope`](https://github.com/ethereum/consensus-specs/blob/v1.7.0-alpha.8/specs/gloas/beacon-chain.md#signedexecutionpayloadenvelope) object from the CL Gloas spec."
    required: [message, signature]
    properties:
      message:
        $ref: "#/Gloas/ExecutionPayloadEnvelope"
      signature:
        $ref: "../primitive.yaml#/Signature"
        description: "BLS signature of the execution payload envelope"

  SignedExecutionPayloadEnvelopeContents:
    type: object
    description: |
      Signed execution payload envelope bundled with blobs and KZG proofs for stateless
      publishing. Used when the validator client publishes to a beacon node that does not
      have the blobs cached (e.g. multi-BN setups, distributed validators, failover).
    required: [signed_execution_payload_envelope, kzg_proofs, blobs]
    properties:
      signed_execution_payload_envelope:
        $ref: "#/Gloas/SignedExecutionPayloadEnvelope"
      kzg_proofs:
        $ref: "../fulu/block_contents.yaml#/Fulu/KZGProofs"
      blobs:
        $ref: "../deneb/block_contents.yaml#/Deneb/Blobs"

  BlindedExecutionPayloadEnvelope:
    type: object
    description: |
      Blinded form of `ExecutionPayloadEnvelope` used in the stateful publishing flow. The
      `payload` field is replaced with `payload_root`, the hash tree root of the full
      execution payload. By construction `hash_tree_root(BlindedExecutionPayloadEnvelope) ==
      hash_tree_root(ExecutionPayloadEnvelope)` when `payload_root` equals
      `hash_tree_root(payload)`, so a validator signature over the blinded envelope is also
      valid over the full envelope. Used when the beacon node has already cached the full
      envelope and blobs from block production, avoiding the bandwidth cost of re-uploading
      transactions and blobs in the publish request.
    required: [payload_root, execution_requests, builder_index, beacon_block_root, parent_beacon_block_root]
    properties:
      payload_root:
        $ref: "../primitive.yaml#/Root"
        description: "Hash tree root of the full `Gloas.ExecutionPayload`"
      execution_requests:
        $ref: "../electra/execution_requests.yaml#/Electra/ExecutionRequests"
      builder_index:
        $ref: "../primitive.yaml#/Uint64"
        description: "Index of the builder that created this execution payload"
      beacon_block_root:
        $ref: "../primitive.yaml#/Root"
        description: "Root of the beacon block for this payload"
      parent_beacon_block_root:
        $ref: "../primitive.yaml#/Root"
        description: "Root of the parent beacon block"

  SignedBlindedExecutionPayloadEnvelope:
    type: object
    description: |
      Signed form of `BlindedExecutionPayloadEnvelope`. The signature is produced over the
      hash tree root of the message, which by construction matches the hash tree root of the
      corresponding full `ExecutionPayloadEnvelope`.
    required: [message, signature]
    properties:
      message:
        $ref: "#/Gloas/BlindedExecutionPayloadEnvelope"
      signature:
        $ref: "../primitive.yaml#/Signature"
        description: "BLS signature of the blinded execution payload envelope"
