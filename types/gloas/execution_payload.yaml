Gloas:
  ExecutionPayload:
    description: "The [`ExecutionPayload`](https://github.com/ethereum/consensus-specs/blob/v1.7.0-alpha.7/specs/gloas/beacon-chain.md#executionpayload) object from the CL Gloas spec."
    allOf:
      - $ref: "../deneb/execution_payload.yaml#/Deneb/ExecutionPayload"
      - type: object
        required: [block_access_list, slot_number]
        properties:
          block_access_list:
            $ref: "../primitive.yaml#/BlockAccessList"
          slot_number:
            $ref: "../primitive.yaml#/Uint64"
