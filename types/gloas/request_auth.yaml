Gloas:
  RequestAuthV1:
    type: object
    description: "The `RequestAuthV1` object from the [Builder API](https://ethereum.github.io/builder-specs/) Gloas spec."
    required: [data, slot]
    properties:
      data:
        type: string
        format: hex
        description: |
          Opaque authentication data unique to the builder, agreed upon out of band. The meaning of
          the up to `MAX_DATA_SIZE` (4096) bytes is left to the two parties; the builder checks the
          exact bytes when it verifies. When no value has been agreed out of band, implementations
          SHOULD default to the UTF-8 bytes of the builder's own advertised URL, exactly as
          advertised, so proposers with no prior relationship can construct an identical `data`
          deterministically.
        example: "0x1234567890abcdef"
        pattern: "^0x(?:[a-fA-F0-9]{2}){0,4096}$"
      slot:
        allOf:
          - $ref: "../primitive.yaml#/Uint64"
          - description: "The proposal slot this request is authorized for."

  SignedRequestAuthV1:
    type: object
    description: "The `SignedRequestAuthV1` object from the [Builder API](https://ethereum.github.io/builder-specs/) Gloas spec."
    required: [message, signature]
    properties:
      message:
        $ref: "#/Gloas/RequestAuthV1"
      signature:
        $ref: "../primitive.yaml#/Signature"
