Gloas:
  RequestAuthV1:
    type: object
    description: "The `RequestAuthV1` object from the [Builder API](https://ethereum.github.io/builder-specs/) Gloas spec."
    required: [data, slot]
    properties:
      data:
        type: string
        format: hex
        description: |
          Opaque authentication data unique to the builder, agreed upon out of band. The meaning of
          the up to `MAX_DATA_SIZE` bytes is left to the two parties; the builder verifies the exact
          bytes. When no value has been agreed out of band, implementations SHOULD default to the
          builder's URL exactly as advertised, so proposers with no prior relationship (and DVT
          operators sharing static config) can construct an identical `data` deterministically.
        example: "0x1234567890abcdef"
        pattern: "^0x[a-fA-F0-9]{0,8192}$"
      slot:
        allOf:
          - $ref: "../primitive.yaml#/Uint64"
          - description: "The proposal slot this request is authorized for."

  SignedRequestAuthV1:
    type: object
    description: "The `SignedRequestAuthV1` object from the [Builder API](https://ethereum.github.io/builder-specs/) Gloas spec."
    required: [message, signature]
    properties:
      message:
        $ref: "#/Gloas/RequestAuthV1"
      signature:
        $ref: "../primitive.yaml#/Signature"
