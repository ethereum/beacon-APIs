Bellatrix:
  PayloadAttributesEventData:
    type: object
    properties:
      proposer_index:
        $ref: '../primitive.yaml#/Uint64'
        description: "The validator index of the proposer at `proposal_slot` on the chain identified by `parent_block_root`."
      proposal_slot:
        $ref: '../primitive.yaml#/Uint64'
        description: "The slot at which a block using these payload attributes may be built."
      parent_block_number:
        $ref: '../primitive.yaml#/Uint64'
        description: "The execution block number of the parent block."
      parent_block_root:
        $ref: '../primitive.yaml#/Root'
        description: "The beacon block root of the parent block to be built upon."
      parent_block_hash:
        $ref: '../primitive.yaml#/Bytes32'
        description: "The execution block hash of the parent block."
      payload_attributes:
        type: object
        description: "Beacon API encoding of `PayloadAttributesV<N>` as defined by the `execution-apis` specification."
