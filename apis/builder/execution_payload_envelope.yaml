post:
  operationId: constructExecutionPayloadEnvelope
  summary: Construct the execution payload envelope for signing and broadcasting
  description: |
    Builder-facing endpoint that accepts the components needed to construct an
    `ExecutionPayloadEnvelope`. The beacon node computes the `beacon_block_root`
    from the supplied `SignedBeaconBlock` and derives the post-execution
    `state_root`, returning a complete `ExecutionPayloadEnvelope` ready for the
    builder to sign and broadcast.
  tags:
    - Builder
  parameters:
    - in: header
      schema:
        $ref: "../../beacon-node-oapi.yaml#/components/schemas/ConsensusVersion"
      required: true
      name: Eth-Consensus-Version
      description: "The active consensus version for the supplied data."
  requestBody:
    description: "Components required to construct the `ExecutionPayloadEnvelope`."
    required: true
    content:
      application/json:
        schema:
          title: ConstructExecutionPayloadEnvelopeRequest
          type: object
          required: [signed_beacon_block, execution_payload, execution_requests, builder_index, slot]
          properties:
            signed_beacon_block:
              $ref: "../../beacon-node-oapi.yaml#/components/schemas/Gloas.SignedBeaconBlock"
            execution_payload:
              $ref: "../../beacon-node-oapi.yaml#/components/schemas/Deneb.ExecutionPayload"
            execution_requests:
              $ref: "../../beacon-node-oapi.yaml#/components/schemas/Electra.ExecutionRequests"
  responses:
    "200":
      description: "Successfully constructed the execution payload envelope"
      headers:
        Eth-Consensus-Version:
          $ref: '../../beacon-node-oapi.yaml#/components/headers/Eth-Consensus-Version'
      content:
        application/json:
          schema:
            title: ConstructExecutionPayloadEnvelopeResponse
            type: object
            required: [version, data]
            properties:
              version:
                type: string
                enum: [gloas]
                example: "gloas"
              data:
                $ref: "../../beacon-node-oapi.yaml#/components/schemas/Gloas.ExecutionPayloadEnvelope"
    "400":
      description: "Invalid request: malformed input or failed validation"
      content:
        application/json:
          schema:
            $ref: "../../beacon-node-oapi.yaml#/components/schemas/ErrorMessage"
          example:
            code: 400
            message: "Invalid request body"
    "500":
      $ref: "../../beacon-node-oapi.yaml#/components/responses/InternalError"
