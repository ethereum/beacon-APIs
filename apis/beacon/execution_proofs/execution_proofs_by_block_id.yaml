get:
  operationId: getExecutionProofs
  summary: Get execution proofs
  description: |
    Retrieves signed execution proofs for a given block id.
    Depending on `Accept` header it can be returned either as JSON or as bytes serialized by SSZ.

    Proofs are returned as a list of `SignedExecutionProof` objects signed by validators. The list order is not specified and clients MUST NOT rely on it.

    Proofs are only available for recent blocks within the proof retention period.

    Beacon nodes running without an attached proof engine MUST return `501 Not Implemented`.
  tags:
    - Beacon
  parameters:
    - name: block_id
      in: path
      required: true
      $ref: "../../../beacon-node-oapi.yaml#/components/parameters/BlockId"
  responses:
    "200":
      description: Successful response
      content:
        application/json:
          schema:
            title: GetExecutionProofsResponse
            type: object
            required: [execution_optimistic, finalized, data]
            properties:
              execution_optimistic:
                $ref: "../../../beacon-node-oapi.yaml#/components/schemas/ExecutionOptimistic"
              finalized:
                $ref: "../../../beacon-node-oapi.yaml#/components/schemas/Finalized"
              data:
                type: array
                items:
                  $ref: '../../../beacon-node-oapi.yaml#/components/schemas/EIP8025.SignedExecutionProof'
        application/octet-stream:
          schema:
            description: "SSZ serialized `List[SignedExecutionProof, MAX_EXECUTION_PROOFS_PER_PAYLOAD]` bytes. Use Accept header to choose this response type"
    "400":
      description: "The block ID supplied could not be parsed"
      content:
        application/json:
          schema:
            $ref: "../../../beacon-node-oapi.yaml#/components/schemas/ErrorMessage"
          example:
            code: 400
            message: "Invalid block ID: current"
    "404":
      description: "Block not found"
      content:
        application/json:
          schema:
            $ref: "../../../beacon-node-oapi.yaml#/components/schemas/ErrorMessage"
          example:
            code: 404
            message: "Block not found"
    "406":
      $ref: "../../../beacon-node-oapi.yaml#/components/responses/NotAcceptable"
    "500":
      $ref: '../../../beacon-node-oapi.yaml#/components/responses/InternalError'
    "501":
      $ref: '../../../beacon-node-oapi.yaml#/components/responses/NotImplementedError'
