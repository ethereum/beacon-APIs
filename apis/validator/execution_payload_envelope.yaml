get:
  operationId: getExecutionPayloadEnvelope
  summary: Get execution payload envelope
  description: |
    Retrieves the cached execution payload envelope for the current proposer's slot. Returned
    in blinded form by default (the `transactions`, `withdrawals`, and `block_access_list`
    fields are replaced by their hash tree roots); pass `blinded=false` to receive the full
    envelope instead. The hash tree root of `BlindedExecutionPayloadEnvelope` matches the
    hash tree root of the corresponding full `ExecutionPayloadEnvelope`, so a signature
    produced over either form is valid against the other.

    The beacon node only caches the envelope for the current slot's self-built payload.
    Requests for older slots or slots where no envelope has been cached will return a 404
    error. This endpoint does not fetch payloads from the execution layer.

    The response form is indicated by the `Eth-Execution-Payload-Blinded` header and the
    `execution_payload_blinded` field; clients should use this signal to select the
    deserialization schema.

    Depending on `Accept` header, the response can be returned either as JSON or as bytes serialized by SSZ.
  tags:
    - Validator
    - ValidatorRequiredApi
  parameters:
    - name: slot
      in: path
      required: true
      description: "Slot for which the execution payload envelope is requested."
      schema:
        $ref: "../../beacon-node-oapi.yaml#/components/schemas/Uint64"
    - name: beacon_block_root
      in: path
      required: true
      description: |
        Root of the beacon block associated with this execution payload envelope. The beacon
        node will verify that the cached envelope matches the given block root, returning a
        404 if there is no match. Requiring the block root makes the lookup re-org resistant:
        if a re-org occurs between block production and envelope retrieval, the validator client
        will receive a 404 rather than an envelope committed to a stale block.
      schema:
        $ref: "../../beacon-node-oapi.yaml#/components/schemas/Root"
    - name: blinded
      in: query
      required: false
      description: |
        Caller preference for the envelope form. When `true` (default), the beacon node
        returns a `BlindedExecutionPayloadEnvelope` (transactions, withdrawals, and block
        access list replaced by their hash tree roots), recommended for the stateful
        publishing flow where the beacon node already has the full data cached. When `false`,
        the beacon node returns the full `ExecutionPayloadEnvelope`. The actually returned
        form is reported in the `Eth-Execution-Payload-Blinded` response header.
      schema:
        type: boolean
        default: true
  responses:
    "200":
      description: "Successful response"
      headers:
        Eth-Consensus-Version:
          $ref: "../../beacon-node-oapi.yaml#/components/headers/Eth-Consensus-Version"
        Eth-Execution-Payload-Blinded:
          $ref: "../../beacon-node-oapi.yaml#/components/headers/Eth-Execution-Payload-Blinded"
      content:
        application/json:
          schema:
            title: GetExecutionPayloadEnvelopeResponse
            type: object
            required: [version, execution_payload_blinded, data]
            properties:
              version:
                type: string
                enum: [gloas]
                example: "gloas"
              execution_payload_blinded:
                type: boolean
                description: "Indicates which envelope form is returned. `true` for `BlindedExecutionPayloadEnvelope`, `false` for the full `ExecutionPayloadEnvelope`."
                example: true
              data:
                anyOf:
                  - $ref: "../../beacon-node-oapi.yaml#/components/schemas/Gloas.BlindedExecutionPayloadEnvelope"
                  - $ref: "../../beacon-node-oapi.yaml#/components/schemas/Gloas.ExecutionPayloadEnvelope"
        application/octet-stream:
          schema:
            description: "SSZ serialized `BlindedExecutionPayloadEnvelope` or `ExecutionPayloadEnvelope` bytes; use the `Eth-Execution-Payload-Blinded` response header to select the schema."
    "400":
      description: "Invalid execution payload envelope request"
      content:
        application/json:
          schema:
            $ref: "../../beacon-node-oapi.yaml#/components/schemas/ErrorMessage"
          example:
            code: 400
            message: "Invalid slot parameter"
    "404":
      description: "No cached execution payload envelope available for the requested slot. The beacon node only caches the envelope for the current proposer's self-built payload."
      content:
        application/json:
          schema:
            $ref: "../../beacon-node-oapi.yaml#/components/schemas/ErrorMessage"
          example:
            code: 404
            message: "Execution payload envelope not available for slot"
    "406":
      $ref: "../../beacon-node-oapi.yaml#/components/responses/NotAcceptable"
    "500":
      $ref: "../../beacon-node-oapi.yaml#/components/responses/InternalError"
