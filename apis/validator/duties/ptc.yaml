get:
  tags:
    - ValidatorRequiredApi
    - Validator
  operationId: "getPTCDuties"
  summary: "Get PTC duties"
  description: |
    Requests the beacon node to provide a set of `PayloadAttestationData` for the given slot, each with the
    validator indices that should sign it.

    This endpoint is used by PTC validators to obtain the data structure they need to attest to
    regarding payload presence and blob data availability for a specific slot.

    A 503 error must be returned if the beacon node is currently syncing.
  parameters:
    - name: slot
      in: path
      required: true
      description: "The slot for which to obtain PTC duties."
      schema:
        $ref: "../../../beacon-node-oapi.yaml#/components/schemas/Uint64"
  responses:
    "200":
      description: "Success response"
      headers:
        Eth-Consensus-Version:
          $ref: "../../../beacon-node-oapi.yaml#/components/headers/Eth-Consensus-Version"
      content:
        application/json:
          schema:
            title: GetPTCDutiesResponse
            type: object
            required: [version, execution_optimistic, data]
            properties:
              version:
                type: string
                enum: [gloas]
                example: "gloas"
              execution_optimistic:
                $ref: "../../../beacon-node-oapi.yaml#/components/schemas/ExecutionOptimistic"
              data:
                type: array
                items:
                  $ref: "../../../beacon-node-oapi.yaml#/components/schemas/Gloas.PTCDuty"
        application/octet-stream:
          schema:
            description: "SSZ serialized `List[PTCDuty]` bytes. Use Accept header to choose this response type"
    "400":
      $ref: "../../../beacon-node-oapi.yaml#/components/responses/InvalidRequest"
    "500":
      $ref: "../../../beacon-node-oapi.yaml#/components/responses/InternalError"
    "503":
      $ref: "../../../beacon-node-oapi.yaml#/components/responses/CurrentlySyncing"
