get:
  tags:
    - ValidatorRequiredApi
    - Validator
  operationId: "producePayloadAttestationData"
  summary: "Produce payload attestation data"
  description: |
    Requests that the beacon node produce a `PayloadAttestationData`.

    This endpoint is used by PTC validators to obtain the data structure they need to attest to
    regarding payload presence and blob data availability for a specific slot.

    A 404 error must be returned if no canonical beacon block has been seen for the
    requested slot. Per the
    [honest validator specification](https://github.com/ethereum/consensus-specs/blob/dev/specs/gloas/validator.md#constructing-a-payload-attestation),
    a PTC member must not submit a payload attestation when no block has been seen for the
    assigned slot. Empty slots are common, so callers should treat 404 as the expected
    "no block" signal and skip submission rather than retry.

    A 503 error must be returned if the beacon node is currently syncing.
  parameters:
    - name: slot
      in: path
      required: true
      description: "The slot for which payload attestation data should be created."
      schema:
        $ref: "../../beacon-node-oapi.yaml#/components/schemas/Uint64"
  responses:
    "200":
      description: "Success response"
      headers:
        Eth-Consensus-Version:
          $ref: "../../beacon-node-oapi.yaml#/components/headers/Eth-Consensus-Version"
      content:
        application/json:
          schema:
            title: ProducePayloadAttestationDataResponse
            type: object
            required: [version, data]
            properties:
              version:
                type: string
                enum: [gloas]
                example: "gloas"
              data:
                $ref: "../../beacon-node-oapi.yaml#/components/schemas/Gloas.PayloadAttestationData"
        application/octet-stream:
          schema:
            description: "SSZ serialized `PayloadAttestationData` bytes. Use Accept header to choose this response type"
    "400":
      $ref: "../../beacon-node-oapi.yaml#/components/responses/InvalidRequest"
    "404":
      description: "No canonical block has been seen for the requested slot."
      content:
        application/json:
          schema:
            $ref: "../../beacon-node-oapi.yaml#/components/schemas/ErrorMessage"
          example:
            code: 404
            message: "No canonical block found at slot=1234"
    "406":
      $ref: "../../beacon-node-oapi.yaml#/components/responses/NotAcceptable"
    "500":
      $ref: "../../beacon-node-oapi.yaml#/components/responses/InternalError"
    "503":
      $ref: "../../beacon-node-oapi.yaml#/components/responses/CurrentlySyncing"
